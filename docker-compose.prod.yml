# Deploy de produção do worker bot-planilha-sefaz no SRVRPS03 (FASE 6).
#
# Pré-requisitos no host (ver README §Deploy):
#   1. Share \\SRVDOC01\REDE\FISCAL acessível no host e exposto via SHARE_HOST_PATH
#      (ver bloco env abaixo). No SRVRPS03 = Windows+WSL2/drvfs em /mnt/r/FISCAL;
#      em Linux nativo = CIFS in-kernel em /mnt/fiscal (default).
#   2. credentials/<google-sa>.json presente (gitignored — copiar manualmente).
#   3. .env preenchido com SEFAZ/Google/Maestro/RabbitMQ (ver .env.example).
#   4. Migration 000009 (job_logs.actionable) aplicada no DB do Maestro.
#
# O RabbitMQ e a API HTTP são do rps-maestro (rodam em outro container/host) —
# este compose sobe SÓ o worker e conecta no broker existente.
services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: bot-planilha-sefaz:latest
    container_name: bot-planilha-sefaz-worker
    restart: unless-stopped

    # Janela para o encerramento gracioso. Em `docker stop`/restart o worker
    # recebe SIGTERM e transforma em cancelamento cooperativo: cancela as
    # empresas pending, aguarda as in-flight (Selenium/CAPTCHA, 1-3 min cada),
    # reporta `canceled` ao Maestro e dá ack ANTES de sair. O default de 10s
    # vira SIGKILL no meio do job (job preso 'running' + reentrega). 120s cobre
    # o pior caso de até max_workers empresas in-flight.
    stop_grace_period: 120s

    # Segredos e config de negócio vêm do .env (fora do git).
    env_file:
      - .env

    # Overrides específicos do container. Têm precedência sobre o .env.
    environment:
      HEADLESS: "true"
      CHROME_BINARY: /usr/bin/chromium
      CHROMEDRIVER_PATH: /usr/bin/chromedriver
      # /share = mountpoint do \\SRVDOC01\REDE\FISCAL (ver volume abaixo).
      DESTINO_BASE: /share/00 PLANILHA SEFAZ
      GOOGLE_CREDENTIALS_FILE: /run/credentials/google-sa.json
      # Conexão com o rps-maestro. Defaults assumem o broker/API no próprio host.
      MAESTRO_API_URL: ${MAESTRO_API_URL:-http://host.docker.internal:8080}
      MAESTRO_RABBITMQ_HOST: ${MAESTRO_RABBITMQ_HOST:-host.docker.internal}
      MAESTRO_RABBITMQ_PORT: ${MAESTRO_RABBITMQ_PORT:-5672}
      MAESTRO_RABBITMQ_QUEUE: ${MAESTRO_RABBITMQ_QUEUE:-bot-planilha-tasks}

    volumes:
      # Share de destino das planilhas (read-write — o worker escreve os CSVs).
      # SHARE_HOST_PATH é o mountpoint do share no HOST. Default cobre o cenário
      # "Linux nativo + CIFS in-kernel em /mnt/fiscal" da decisão #11. No SRVRPS03
      # o host é Windows com WSL2 + Docker; o share \\SRVDOC01\REDE entra via
      # drvfs em /mnt/r (mapeado no Windows como R:), e o .env aponta para
      # SHARE_HOST_PATH=/mnt/r/FISCAL — o motivo é bug conhecido do CIFS
      # in-kernel no WSL2 6.x (UPCALL/SPNEGO ENOKEY).
      - ${SHARE_HOST_PATH:-/mnt/fiscal}:/share
      # Credencial do Service Account, montada read-only (não vai pra imagem).
      - ./credentials/citric-nimbus-436114-g8-daacef9f0900.json:/run/credentials/google-sa.json:ro
      # Logs persistidos no host pra inspeção pós-mortem.
      - ./log:/app/log

    # Chrome usa /dev/shm; mesmo com --disable-dev-shm-usage, 1g evita crashes
    # esporádicos de aba em páginas pesadas.
    shm_size: "1gb"

    security_opt:
      - no-new-privileges:true

    # host.docker.internal resolve o host de dentro do container (Linux).
    extra_hosts:
      - "host.docker.internal:host-gateway"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
